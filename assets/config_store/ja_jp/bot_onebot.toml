# https://toml.io/ja/v1.0.0
# 注：TOML は Python ではありませんので、ここでは Python の文法を使用しないでください。
# 例：TOML のブール値は小文字である必要があります。

[bot_onebot]
# クライアントの設定項目です。ここに入力された値は、メッセージ内にプレーンテキストで表示されます。この部分には機密情報を入力しないでください。
enable = false # このクライアントを有効にするかどうか。
qq_host = "127.0.0.1:8080" # WebSocket メインサーバーのアドレス。（OneBot プロトコル側はリバース WebSocket 方式を使用して接続する必要があります）
qq_enable_listening_self_message = false # OneBot プロトコルを使用するときに、自己メッセージの監視を有効にするかどうか。
qq_enable_temp_session = false # OneBot プロトコルを使用するときに、一時セッションを有効にするかどうか。
qq_allow_approve_friend = false # OneBot プロトコルを使用するときに、友達リクエストを自動的に承認するかどうか。
qq_allow_approve_group_invite = false # OneBot プロトコルを使用するときに、グループの招待を自動的に受け入れるかどうか。
qq_typing_emoji = 181 # OneBot プロトコルでメッセージを処理するときにメッセージに添付される応答絵文字の ID。プロトコルのサポートが必要です。ID の詳細について：https://bot.q.qq.com/wiki/develop/api-v2/openapi/emoji/model.html#Emoji をご覧ください。
qq_limited_emoji = 10060 # OneBot プロトコルでメッセージ処理に失敗した際にメッセージに付加される応答絵文字の ID。プロトコルのサポートが必要です。ID の詳細について：https://bot.q.qq.com/wiki/develop/api-v2/openapi/emoji/model.html#Emoji をご覧ください。
qq_initiative_msg_cooldown = 10 # アクティブ メッセージ送信のクールダウン時間を制限します。単位は秒です。

[bot_onebot_secret]
# クライアントのキー設定項目です。ここに入力された値は、送信メッセージに誤って含まれた場合、ボットはそれを傍受しようとします。ただし、漏洩を防ぐよう注意してください。
qq_access_token = "<Replace me with str value>" # OneBot プロトコルを使用するときに、WebSocket サーバーに接続するための Access Token。
