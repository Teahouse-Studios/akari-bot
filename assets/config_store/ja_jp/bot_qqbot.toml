# https://toml.io/ja/v1.0.0
# 注：TOML は Python ではありませんので、ここでは Python の文法を使用しないでください。
# 例：TOML のブール値は小文字である必要があります。

[bot_qqbot]
# クライアントの設定項目です。ここに入力された値は、メッセージ内にプレーンテキストで表示されます。この部分には機密情報を入力しないでください。
enable = false # このクライアントを有効にするかどうか。
qq_bot_appid = "<Replace me with (str, int) value>" # QQ ロボット（公式）の AppID。
qq_bot_openid = "<Replace me with str value>" # QQ 机器人（官方）的 OpenID。
qq_private_bot = false # QQ ロボット（公式）を使用する場合、プライベートドメイン ロボットであるかどうか。
qq_typing_emoji = 181 # QQ ロボット（公式）メッセージを処理するときにメッセージに添付される応答絵文字の ID。ID の詳細について：https://bot.q.qq.com/wiki/develop/api-v2/openapi/emoji/model.html#Emoji をご覧ください。

[bot_qqbot_secret]
# クライアントのキー設定項目です。ここに入力された値は、送信メッセージに誤って含まれた場合、ボットはそれを傍受しようとします。ただし、漏洩を防ぐよう注意してください。
qq_bot_secret = "<Replace me with str value>" # QQ ロボット（公式）の AppSecret。
