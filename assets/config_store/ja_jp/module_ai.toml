# https://toml.io/ja/v1.0.0
# 注：TOML は Python ではありませんので、ここでは Python の文法を使用しないでください。
# 例：TOML のブール値は小文字である必要があります。

[module_ai]
# モジュールの設定項目です。ここに入力された値は、メッセージ内にプレーンテキストで表示されます。この部分には機密情報を入力しないでください。
llm_max_tokens = 2048 # LLM のトークン数の上限を設定します。
llm_timeout = 60 # LLM のタイムアウト。
llm_temperature = 1 # LLM の温度サンプリング。範囲は 0 ～ 2 です。top_p と同時に変更することは推奨されません。
llm_top_p = 1 # LLM のカーネルサンプリング。範囲は 0 ～ 1 です。temperature と同時に変更することは推奨されません。
llm_frequency_penalty = 0 # LLM の周波数ペナルティ。範囲は -2 ～ 2 です。
llm_presence_penalty = 0 # LLM の存在ペナルティ。範囲は -2 ～ 2 です。
ai_default_llm = "<Replace me with str value>" # デフォルトで使用される LLM。

[module_ai_secret]
# モジュールのキー設定項目です。ここに入力された値は、送信メッセージに誤って含まれた場合、ボットはそれを傍受しようとします。ただし、漏洩を防ぐよう注意してください。
e2b_api_key = "<Replace me with str value>" # E2B API キー。
