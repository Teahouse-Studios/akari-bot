# https://toml.io/ko/v1.0.0
# 주의: TOML은 Python이 아닙니다. Python 문법을 사용하지 마십시오.
# 예: TOML의 불리언 값은 반드시 소문자로 작성해야 합니다.

[module_ai]
# 모듈의 구성 섹션입니다. 여기에 입력한 값은 메시지에 일반 텍스트로 표시됩니다. 민감한 정보는 이 섹션에 입력하지 마십시오.
llm_max_tokens = 2048 # 限制大语言模型的最大 Token 数。
llm_timeout = 60 # 大语言模型的超时时间。
llm_temperature = 1 # 大语言模型的温度采样，范围 0 到 2 之间。不建议与 top_p 同时修改。
llm_top_p = 1 # 大语言模型的核采样，范围 0 到 1 之间。不建议与 temperature 同时修改。
llm_frequency_penalty = 0 # 大语言模型的频率惩罚，范围 -2 到 2 之间。
llm_presence_penalty = 0 # 大语言模型的存在惩罚，范围 -2 到 2 之间。
ai_default_llm = "<Replace me with str value>" # 默认使用的大语言模型。

[module_ai_secret]
# 모듈의 키 설정 섹션입니다. 이 값이 전송된 메시지에 실수로 나타날 경우 봇이 해당 메시지를 가로채려고 시도합니다. 하지만 이 값이 유출되지 않도록 각별히 주의해 주십시오.
e2b_api_key = "<Replace me with str value>" # E2B 的 API key。
