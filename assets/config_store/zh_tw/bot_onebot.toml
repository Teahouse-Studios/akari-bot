# https://toml.io/cn/v1.0.0
# 注意：TOML 不是 Python。請不要在此處使用 Python 語法。
# 例如：TOML 中的布林值必須是小寫。

[bot_onebot]
# 用戶端的組態部分，此處填寫的值可在訊息中以明文顯示。請不要在此部分填寫敏感資訊。
enable = false # 是否啟用此用户端。
qq_host = "127.0.0.1:8080" # WebSocket 主伺服器的位址。（OneBot 協定端請使用反向 WebSocket 方式連線）
qq_enable_listening_self_message = false # 使用 OneBot 協定時，是否啟用自身訊息監聽。
qq_enable_temp_session = false # 使用 OneBot 協定時，是否啟用臨時會話。
qq_allow_approve_friend = false # 使用 OneBot 協定時，是否自動同意好友請求。
qq_allow_approve_group_invite = false # 使用 OneBot 協定時，是否自動同意群組邀請。
qq_typing_emoji = 181 # 使用 OneBot 協定時，正在處理訊息時向訊息掛上的回應表情 ID，需協定端支援。 ID 詳見：https://bot.q.qq.com/wiki/develop/api-v2/openapi/emoji/model.html#Emoji
qq_limited_emoji = 10060 # 使用 OneBot 協定時，訊息處理失敗時向訊息掛上的回應表情 ID，需協定端支援。 ID 詳見：https://bot.q.qq.com/wiki/develop/api-v2/openapi/emoji/model.html#Emoji
qq_initiative_msg_cooldown = 10 # 限制主動訊息傳送的冷卻時間，單位為秒。

[bot_onebot_secret]
# 用戶端的金鑰組態部分，此處的值若意外出現在傳送的訊息中，機器人會嘗試攔截。但請務必提防洩漏。
qq_access_token = "<Replace me with str value>" # 使用 OneBot 协议时，连接 WebSocket 服务器的 Access Token。
